[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command     = "npm run dev"
  port        = 5173
  targetPort  = 5173
  autoLaunch  = false

# Redirigir /api/* a las funciones
[[redirects]]
  from   = "/api/mundo"
  to     = "/.netlify/functions/mundo"
  status = 200

[[redirects]]
  from   = "/api/bcra"
  to     = "/.netlify/functions/bcra"
  status = 200

[[redirects]]
  from   = "/api/cotizaciones"
  to     = "/.netlify/functions/cotizaciones"
  status = 200

[[redirects]]
  from   = "/api/indec"
  to     = "/.netlify/functions/indec"
  status = 200

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
